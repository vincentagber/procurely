services:
  # ----------------------------------------------------------------------------
  # Backend API (PHP/Slim)
  # ----------------------------------------------------------------------------
  - type: web
    name: procurely-api
    env: docker
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    plan: starter # Starter or higher required for Persistent Disks
    healthCheckPath: /
    envVars:
      - key: APP_DEBUG
        value: "false"
      - key: DB_DRIVER
        value: sqlite
      - key: DATABASE_PATH
        value: /var/lib/procurely/data/procurely.sqlite
      - key: UPLOAD_PATH
        value: /var/lib/procurely/uploads
      - key: FRONTEND_URL
        fromService:
          name: procurely-frontend
          type: web
          property: url
      # Add other production environment variables here (SMTP, Paystack, etc.)
      - key: SMTP_HOST
        value: server381.web-hosting.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        sync: false # Set in Render Dashboard
      - key: SMTP_PASS
        sync: false # Set in Render Dashboard
      - key: PAYSTACK_PUBLIC_KEY
        value: pk_test_06667fc0ac4facd867b87f561266fe10e9d8d700
      - key: PAYSTACK_SECRET_KEY
        sync: false # Set in Render Dashboard

    disk:
      name: procurely-storage
      mountPath: /var/lib/procurely
      sizeGB: 1

  # ----------------------------------------------------------------------------
  # Frontend (Next.js)
  # ----------------------------------------------------------------------------
  - type: web
    name: procurely-frontend
    env: node
    plan: starter
    rootDirectory: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        fromService:
          name: procurely-api
          type: web
          property: url
      - key: NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY
        value: pk_test_06667fc0ac4facd867b87f561266fe10e9d8d700
