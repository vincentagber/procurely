name: Procurely CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

env:
  PRODUCTION_URL: "https://useprocurely.com"
  API_BASE_URL: "https://api.useprocurely.com"

jobs:
  backend-tests:
    name: Backend API & Database Validation
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: procurely_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, sqlite3
          tools: composer, phpunit

      - name: Install Backend Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
        working-directory: ./backend

      - name: Execute API and DB Integrity Tests
        env:
          DB_DRIVER: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: procurely_test
          DB_USER: root
          DB_PASS: root
        run: |
          cp .env.example .env
          vendor/bin/phpunit --testdox
        working-directory: ./backend

  frontend-quality:
    name: Frontend Quality & Performance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Lint & Code Quality Checks
        run: npm run lint
        working-directory: ./frontend

      - name: Build and Bundle Size Check
        run: npm run build
        working-directory: ./frontend

      - name: Performance Benchmarking (Static)
        run: bash .github/scripts/performance-check.sh "http://localhost:8000" "http://localhost:3000"
        continue-on-error: true

  e2e-critical-flows:
    name: E2E Workflows & Navigation
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-quality]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: ./frontend

      - name: Build Frontend for E2E
        run: npm run build
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: "http://127.0.0.1:8000"

      - name: Run Playwright Tests (Navigation, Cart, Workflows)
        run: npx playwright test
        working-directory: ./frontend
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 10

  deploy-to-cpanel:
    name: Automated cPanel Deployment
    runs-on: ubuntu-latest
    needs: [e2e-critical-flows]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Pre-flight Config & Permission Checks
        run: bash .github/scripts/validate-env.sh

      - name: Build Frontend for Production
        run: |
          cd frontend
          npm ci
          npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: "https://api.useprocurely.com"
          NODE_ENV: production

      - name: Deploy to cPanel via SSH/Rsync
        run: bash .github/scripts/cpanel-deploy.sh
        env:
          SSH_PRIVATE_KEY: ${{ secrets.CPANEL_SSH_KEY }}
          SSH_HOST: ${{ secrets.CPANEL_HOST }}
          SSH_USER: ${{ secrets.CPANEL_USER }}
          API_DEST_DIR: ${{ secrets.API_DEST_DIR }}
          FRONTEND_DEST_DIR: ${{ secrets.FRONTEND_DEST_DIR }}

      - name: Post-Deployment Smoke Test
        run: |
          echo "Validating API Health..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.useprocurely.com/)
          if [ "$STATUS" -ne 200 ]; then echo "API failed post-deploy (Status $STATUS)"; exit 1; fi
          
          echo "Validating Frontend..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://useprocurely.com/)
          if [ "$STATUS" -ne 200 ]; then echo "Frontend failed post-deploy (Status $STATUS)"; exit 1; fi
          echo "Procurely is safely deployed to production."
